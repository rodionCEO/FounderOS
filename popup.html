<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FounderOS</title>
  <link rel="stylesheet" href="src/css/variables.css" />
  <link rel="stylesheet" href="src/css/base.css" />
  <link rel="stylesheet" href="src/css/components.css" />
  <link rel="stylesheet" href="src/css/animations.css" />
</head>
<body>
  <div id="app" class="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar__brand">
        <span class="topbar__logo" id="brandLogo"></span>
        <span class="topbar__name">FounderOS</span>
      </div>
      <div class="topbar__search">
        <span class="topbar__search-icon" id="searchIcon"></span>
        <input type="text" id="globalSearch" class="topbar__search-input"
               data-i18n-placeholder="search.placeholder" autocomplete="off" readonly />
      </div>
      <div class="topbar__actions">
        <button class="icon-btn" id="quickCaptureBtn" data-i18n-title="quick.title" type="button"></button>
        <button class="icon-btn" id="dockBtn" data-i18n-title="app.dock" type="button"></button>
        <button class="icon-btn" id="expandBtn" data-i18n-title="app.expand" type="button"></button>
        <button class="icon-btn" id="settingsBtn" data-i18n-title="settings.title" type="button"></button>
        <button class="lang-btn" id="langBtn" type="button">EN</button>
      </div>
    </header>

    <!-- Section navigation -->
    <nav class="tabs" id="tabs"></nav>

    <!-- Main content -->
    <main id="view" class="view"></main>

    <!-- Slide-down search panel (opened by clicking the top search box) -->
    <div id="searchPanel" class="search-panel">
      <div class="search-panel__bar">
        <div class="search-panel__field">
          <span class="search-panel__icon" id="searchPanelIcon"></span>
          <input type="text" id="searchPanelInput" class="search-panel__input"
                 data-i18n-placeholder="search.placeholder" autocomplete="off" />
        </div>
        <button class="btn btn--primary btn--sm" id="searchPanelGo" type="button"
                data-i18n="search.button"></button>
        <button class="icon-btn" id="searchPanelClose" type="button"></button>
      </div>
      <div class="search-recent" id="searchRecent" hidden>
        <div class="search-recent__title" data-i18n="search.recent"></div>
        <div class="search-recent__chips" id="searchRecentChips"></div>
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>
  </div>

  <!-- Modal root (Quick Capture, task editor, etc.) -->
  <div id="modalRoot"></div>

  <script type="module" src="src/js/main.js"></script>
</body>
</html>
