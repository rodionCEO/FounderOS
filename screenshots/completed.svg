  <rect x="16" y="162" width="368" height="58" rx="11" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09"/>
  <rect x="16" y="162" width="3" height="58" fill="#46e0a0"/>
  <text x="34" y="190" fill="#46e0a0" font-size="15" filter="url(#glow)">✓</text>
  <text x="56" y="190" fill="#a2a8bc" font-size="13" font-weight="600" text-decoration="line-through">Send pitch deck to angels</text>
  <rect x="56" y="200" width="58" height="16" rx="8" fill="#ff6b6e" fill-opacity="0.16"/>
  <text x="66" y="212" fill="#ff6b6e" font-size="9" font-weight="700">High</text>
  <text x="124" y="212" fill="#6e7488" font-size="10">✓ done 14:20</text>

  <rect x="16" y="230" width="368" height="58" rx="11" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09"/>
  <rect x="16" y="230" width="3" height="58" fill="#46e0a0"/>
  <text x="34" y="258" fill="#46e0a0" font-size="15" filter="url(#glow)">✓</text>
  <text x="56" y="258" fill="#a2a8bc" font-size="13" font-weight="600" text-decoration="line-through">Review onboarding flow</text>
  <rect x="56" y="268" width="48" height="16" rx="8" fill="#ffb454" fill-opacity="0.16"/>
  <text x="66" y="280" fill="#ffb454" font-size="9" font-weight="700">Mid</text>
  <text x="114" y="280" fill="#6e7488" font-size="10">✓ done 11:05</text>

  <!-- Yesterday group -->
  <text x="16" y="320" fill="#a2a8bc" font-size="11" font-weight="700" letter-spacing="1">📅 YESTERDAY</text>
  <text x="372" y="320" fill="#6e7488" font-size="11" text-anchor="end">1</text>

  <rect x="16" y="330" width="368" height="58" rx="11" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09"/>
  <rect x="16" y="330" width="3" height="58" fill="#46e0a0"/>
  <text x="34" y="358" fill="#46e0a0" font-size="15" filter="url(#glow)">✓</text>
