  <text x="160" y="118" fill="#6e7488" font-size="11">3</text>
  <rect x="256" y="102" width="128" height="28" rx="11" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
  <text x="272" y="121" fill="#a2a8bc" font-size="12" font-weight="600">🗄 Clear completed</text>

  <!-- Today group -->
  <text x="16" y="152" fill="#a2a8bc" font-size="11" font-weight="700" letter-spacing="1">📅 TODAY</text>
