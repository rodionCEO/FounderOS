<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <radialGradient id="bg1" cx="0%" cy="0%" r="90%"><stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.22"/><stop offset="55%" stop-color="#0a0a14" stop-opacity="0"/></radialGradient>
    <radialGradient id="bg2" cx="100%" cy="100%" r="90%"><stop offset="0%" stop-color="#3b82f6" stop-opacity="0.20"/><stop offset="55%" stop-color="#0a0a14" stop-opacity="0"/></radialGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="50%" stop-color="#6366f1"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="400" height="600" fill="#0a0a14"/>
  <rect width="400" height="600" fill="url(#bg1)"/>
  <rect width="400" height="600" fill="url(#bg2)"/>

  <rect width="400" height="48" fill="#12121e" fill-opacity="0.7"/>
  <line x1="0" y1="48" x2="400" y2="48" stroke="#ffffff" stroke-opacity="0.09"/>
  <text x="16" y="30" fill="url(#acc)" font-size="16" font-weight="700" filter="url(#glow)">✦ FounderOS</text>
  <text x="328" y="30" fill="#8b8cff" font-size="15">＋</text>
  <text x="352" y="30" fill="#a2a8bc" font-size="15">⤢</text>
  <text x="376" y="30" fill="#a2a8bc" font-size="15">⚙</text>

  <rect y="48" width="400" height="40" fill="#12121e" fill-opacity="0.6"/>
