  <text x="66" y="72" fill="#a2a8bc" font-size="12" font-weight="600">Links</text>
  <text x="106" y="72" fill="#a2a8bc" font-size="12" font-weight="600">Journal</text>
  <rect x="160" y="56" width="86" height="24" rx="7" fill="url(#acc)" fill-opacity="0.18" stroke="#7c7cff" stroke-opacity="0.4"/>
  <text x="172" y="72" fill="#ffffff" font-size="12" font-weight="600">Completed</text>

  <!-- head -->
