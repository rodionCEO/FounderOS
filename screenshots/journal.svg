<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <radialGradient id="bg1" cx="0%" cy="0%" r="90%"><stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.22"/><stop offset="55%" stop-color="#0a0a14" stop-opacity="0"/></radialGradient>
    <radialGradient id="bg2" cx="100%" cy="100%" r="90%"><stop offset="0%" stop-color="#3b82f6" stop-opacity="0.20"/><stop offset="55%" stop-color="#0a0a14" stop-opacity="0"/></radialGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="50%" stop-color="#6366f1"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="400" height="600" fill="#0a0a14"/>
  <rect width="400" height="600" fill="url(#bg1)"/>
  <rect width="400" height="600" fill="url(#bg2)"/>

  <rect width="400" height="48" fill="#12121e" fill-opacity="0.7"/>
  <line x1="0" y1="48" x2="400" y2="48" stroke="#ffffff" stroke-opacity="0.09"/>
  <text x="16" y="30" fill="url(#acc)" font-size="16" font-weight="700" filter="url(#glow)">✦ FounderOS</text>
  <text x="328" y="30" fill="#8b8cff" font-size="15">＋</text>
  <text x="352" y="30" fill="#a2a8bc" font-size="15">⤢</text>
  <text x="376" y="30" fill="#a2a8bc" font-size="15">⚙</text>

  <rect y="48" width="400" height="40" fill="#12121e" fill-opacity="0.6"/>
  <text x="24" y="72" fill="#a2a8bc" font-size="12" font-weight="600">Tasks</text>
  <text x="66" y="72" fill="#a2a8bc" font-size="12" font-weight="600">Ideas</text>
  <text x="108" y="72" fill="#a2a8bc" font-size="12" font-weight="600">Notes</text>
  <rect x="150" y="56" width="66" height="24" rx="7" fill="url(#acc)" fill-opacity="0.18" stroke="#7c7cff" stroke-opacity="0.4"/>
  <text x="162" y="72" fill="#ffffff" font-size="12" font-weight="600">Journal</text>
  <text x="226" y="72" fill="#a2a8bc" font-size="12" font-weight="600">Done</text>

  <!-- date nav -->
  <text x="20" y="116" fill="#a2a8bc" font-size="16">‹</text>
  <text x="200" y="118" fill="#eceef6" font-size="15" font-weight="700" text-anchor="middle">Friday, June 26</text>
  <text x="372" y="116" fill="#a2a8bc" font-size="16" text-anchor="end">›</text>

  <!-- main goal -->
  <text x="16" y="150" fill="#a2a8bc" font-size="12" font-weight="600">Main goal of the day</text>
  <rect x="16" y="158" width="368" height="38" rx="11" fill="#0a0a14" fill-opacity="0.5" stroke="#7c7cff" stroke-opacity="0.5"/>
  <text x="30" y="182" fill="#eceef6" font-size="13">Close the first paying customer</text>

  <!-- completed today -->
  <rect x="16" y="210" width="368" height="92" rx="11" fill="#46e0a0" fill-opacity="0.12"/>
  <text x="32" y="234" fill="#46e0a0" font-size="11" font-weight="700" letter-spacing="1">COMPLETED TODAY</text>
  <text x="32" y="258" fill="#46e0a0" font-size="13">✓</text>
  <text x="50" y="258" fill="#a2a8bc" font-size="13" text-decoration="line-through">Send pitch deck to angels</text>
  <text x="32" y="282" fill="#46e0a0" font-size="13">✓</text>
  <text x="50" y="282" fill="#a2a8bc" font-size="13" text-decoration="line-through">Review onboarding flow</text>

  <!-- did -->
  <text x="16" y="332" fill="#a2a8bc" font-size="12" font-weight="600">What I did today</text>
  <rect x="16" y="340" width="368" height="76" rx="11" fill="#0a0a14" fill-opacity="0.5" stroke="#ffffff" stroke-opacity="0.09"/>
  <text x="30" y="364" fill="#eceef6" font-size="13">Shipped the new onboarding and</text>
  <text x="30" y="384" fill="#eceef6" font-size="13">talked to three potential investors.</text>

  <!-- learned -->
  <text x="16" y="446" fill="#a2a8bc" font-size="12" font-weight="600">What I learned</text>
  <rect x="16" y="454" width="368" height="76" rx="11" fill="#0a0a14" fill-opacity="0.5" stroke="#ffffff" stroke-opacity="0.09"/>
  <text x="30" y="478" fill="#eceef6" font-size="13">Users want a faster setup — cut the</text>
  <text x="30" y="498" fill="#eceef6" font-size="13">flow from 6 steps down to 3.</text>
</svg>
