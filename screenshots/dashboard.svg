<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <radialGradient id="bg1" cx="0%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#0a0a14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="100%" cy="100%" r="90%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#0a0a14" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="600" fill="#0a0a14"/>
  <rect width="400" height="600" fill="url(#bg1)"/>
  <rect width="400" height="600" fill="url(#bg2)"/>

  <!-- topbar -->
  <rect width="400" height="48" fill="#12121e" fill-opacity="0.7"/>
  <line x1="0" y1="48" x2="400" y2="48" stroke="#ffffff" stroke-opacity="0.09"/>
  <text x="16" y="30" fill="url(#acc)" font-size="16" font-weight="700" filter="url(#glow)">✦ FounderOS</text>
  <text x="300" y="30" fill="#a2a8bc" font-size="15">⌕</text>
  <text x="328" y="30" fill="#8b8cff" font-size="15">＋</text>
  <text x="352" y="30" fill="#a2a8bc" font-size="15">⤢</text>
  <text x="376" y="30" fill="#a2a8bc" font-size="15">⚙</text>

  <!-- tabs -->
  <rect y="48" width="400" height="40" fill="#12121e" fill-opacity="0.6"/>
  <rect x="12" y="56" width="86" height="24" rx="7" fill="url(#acc)" fill-opacity="0.18" stroke="#7c7cff" stroke-opacity="0.4"/>
  <text x="24" y="72" fill="#ffffff" font-size="12" font-weight="600">Dashboard</text>
  <text x="108" y="72" fill="#a2a8bc" font-size="12" font-weight="600">Tasks</text>
  <text x="150" y="72" fill="#a2a8bc" font-size="12" font-weight="600">Ideas</text>
  <text x="190" y="72" fill="#a2a8bc" font-size="12" font-weight="600">Notes</text>
  <text x="232" y="72" fill="#a2a8bc" font-size="12" font-weight="600">Links</text>
  <text x="272" y="72" fill="#a2a8bc" font-size="12" font-weight="600">Journal</text>
  <text x="326" y="72" fill="#a2a8bc" font-size="12" font-weight="600">Done</text>

  <!-- TODAY'S FOCUS widget -->
  <rect x="16" y="104" width="368" height="190" rx="12" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09"/>
  <text x="32" y="130" fill="#a2a8bc" font-size="11" font-weight="700" letter-spacing="1">TODAY'S FOCUS</text>

  <rect x="32" y="142" width="336" height="40" rx="10" fill="#0a0a14" fill-opacity="0.5" stroke="#ffffff" stroke-opacity="0.08"/>
  <rect x="32" y="142" width="22" height="40" rx="6" fill="url(#acc)"/>
  <text x="44" y="167" fill="#ffffff" font-size="12" font-weight="800">1</text>
  <text x="68" y="167" fill="#eceef6" font-size="13" font-weight="600">Investor outreach</text>
  <rect x="300" y="153" width="52" height="18" rx="9" fill="#ff6b6e" fill-opacity="0.16"/>
  <text x="310" y="166" fill="#ff6b6e" font-size="10" font-weight="700">high</text>

  <rect x="32" y="190" width="336" height="40" rx="10" fill="#0a0a14" fill-opacity="0.5" stroke="#ffffff" stroke-opacity="0.08"/>
  <rect x="32" y="190" width="22" height="40" rx="6" fill="url(#acc)"/>
  <text x="44" y="215" fill="#ffffff" font-size="12" font-weight="800">2</text>
  <text x="68" y="215" fill="#eceef6" font-size="13" font-weight="600">Launch FounderOS</text>
  <rect x="300" y="201" width="52" height="18" rx="9" fill="#ffb454" fill-opacity="0.16"/>
  <text x="312" y="214" fill="#ffb454" font-size="10" font-weight="700">mid</text>

  <rect x="32" y="238" width="336" height="40" rx="10" fill="#0a0a14" fill-opacity="0.5" stroke="#ffffff" stroke-opacity="0.08"/>
  <rect x="32" y="238" width="22" height="40" rx="6" fill="url(#acc)"/>
  <text x="44" y="263" fill="#ffffff" font-size="12" font-weight="800">3</text>
  <text x="68" y="263" fill="#eceef6" font-size="13" font-weight="600">Product validation</text>

  <!-- overview stats -->
  <rect x="16" y="306" width="368" height="92" rx="12" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09"/>
  <text x="32" y="332" fill="#a2a8bc" font-size="11" font-weight="700" letter-spacing="1">MORNING OVERVIEW</text>
  <text x="32" y="372" fill="#eceef6" font-size="22" font-weight="800">4</text>
  <text x="32" y="388" fill="#6e7488" font-size="11">Active</text>
  <text x="120" y="372" fill="#ff6b6e" font-size="22" font-weight="800">1</text>
  <text x="120" y="388" fill="#6e7488" font-size="11">Overdue</text>
  <text x="210" y="372" fill="#eceef6" font-size="22" font-weight="800">12</text>
  <text x="210" y="388" fill="#6e7488" font-size="11">Ideas</text>
  <text x="300" y="372" fill="#eceef6" font-size="22" font-weight="800">8</text>
  <text x="300" y="388" fill="#6e7488" font-size="11">Notes</text>

  <!-- journal widget -->
  <rect x="16" y="410" width="368" height="80" rx="12" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09"/>
  <text x="32" y="436" fill="#a2a8bc" font-size="11" font-weight="700" letter-spacing="1">JOURNAL</text>
  <text x="32" y="462" fill="#eceef6" font-size="13">🔥 5-day streak</text>
  <rect x="232" y="446" width="136" height="30" rx="10" fill="url(#acc)" filter="url(#glow)"/>
  <text x="252" y="466" fill="#ffffff" font-size="12" font-weight="700">Write today</text>
</svg>
