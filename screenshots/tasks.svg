<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <radialGradient id="bg1" cx="0%" cy="0%" r="90%"><stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.22"/><stop offset="55%" stop-color="#0a0a14" stop-opacity="0"/></radialGradient>
    <radialGradient id="bg2" cx="100%" cy="100%" r="90%"><stop offset="0%" stop-color="#3b82f6" stop-opacity="0.20"/><stop offset="55%" stop-color="#0a0a14" stop-opacity="0"/></radialGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="50%" stop-color="#6366f1"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="400" height="600" fill="#0a0a14"/>
  <rect width="400" height="600" fill="url(#bg1)"/>
  <rect width="400" height="600" fill="url(#bg2)"/>

  <rect width="400" height="48" fill="#12121e" fill-opacity="0.7"/>
  <line x1="0" y1="48" x2="400" y2="48" stroke="#ffffff" stroke-opacity="0.09"/>
  <text x="16" y="30" fill="url(#acc)" font-size="16" font-weight="700" filter="url(#glow)">✦ FounderOS</text>
  <text x="328" y="30" fill="#8b8cff" font-size="15">＋</text>
  <text x="352" y="30" fill="#a2a8bc" font-size="15">⤢</text>
  <text x="376" y="30" fill="#a2a8bc" font-size="15">⚙</text>

  <rect y="48" width="400" height="40" fill="#12121e" fill-opacity="0.6"/>
  <text x="24" y="72" fill="#a2a8bc" font-size="12" font-weight="600">Dashboard</text>
  <rect x="100" y="56" width="56" height="24" rx="7" fill="url(#acc)" fill-opacity="0.18" stroke="#7c7cff" stroke-opacity="0.4"/>
  <text x="112" y="72" fill="#ffffff" font-size="12" font-weight="600">Tasks</text>
  <text x="166" y="72" fill="#a2a8bc" font-size="12" font-weight="600">Ideas</text>
  <text x="206" y="72" fill="#a2a8bc" font-size="12" font-weight="600">Notes</text>
  <text x="248" y="72" fill="#a2a8bc" font-size="12" font-weight="600">Links</text>
  <text x="288" y="72" fill="#a2a8bc" font-size="12" font-weight="600">Journal</text>

  <!-- filter chips + new -->
  <rect x="16" y="102" width="38" height="26" rx="13" fill="url(#acc)" fill-opacity="0.18" stroke="#7c7cff" stroke-opacity="0.45"/>
  <text x="27" y="119" fill="#ffffff" font-size="12" font-weight="600">All</text>
  <rect x="60" y="102" width="46" height="26" rx="13" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09"/>
  <text x="71" y="119" fill="#a2a8bc" font-size="12" font-weight="600">High</text>
  <rect x="112" y="102" width="44" height="26" rx="13" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09"/>
  <text x="123" y="119" fill="#a2a8bc" font-size="12" font-weight="600">Mid</text>
  <rect x="262" y="102" width="122" height="28" rx="11" fill="url(#acc)" filter="url(#glow)"/>
  <text x="282" y="121" fill="#ffffff" font-size="12" font-weight="700">＋ New task</text>

  <!-- Overdue group -->
  <text x="16" y="158" fill="#ff6b6e" font-size="11" font-weight="700" letter-spacing="1">🔥 OVERDUE</text>
  <text x="372" y="158" fill="#6e7488" font-size="11" text-anchor="end">1</text>
  <rect x="16" y="168" width="368" height="62" rx="11" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09"/>
  <rect x="16" y="168" width="3" height="62" fill="#ff6b6e"/>
  <text x="34" y="192" fill="#eceef6" font-size="13" font-weight="600">Send pitch deck to angels</text>
  <rect x="34" y="202" width="58" height="18" rx="9" fill="#ff6b6e" fill-opacity="0.16"/>
  <text x="44" y="215" fill="#ff6b6e" font-size="10" font-weight="700">High</text>
  <rect x="100" y="202" width="92" height="18" rx="9" fill="#ff6b6e" fill-opacity="0.16"/>
  <text x="110" y="215" fill="#ff6b6e" font-size="10" font-weight="700">⏱ due Jun 24</text>

  <!-- Today group -->
  <text x="16" y="262" fill="#a2a8bc" font-size="11" font-weight="700" letter-spacing="1">📅 TODAY</text>
  <text x="372" y="262" fill="#6e7488" font-size="11" text-anchor="end">2</text>
  <rect x="16" y="272" width="368" height="62" rx="11" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09"/>
  <rect x="16" y="272" width="3" height="62" fill="#ffb454"/>
  <text x="34" y="296" fill="#eceef6" font-size="13" font-weight="600">Review onboarding flow</text>
  <rect x="34" y="306" width="48" height="18" rx="9" fill="#ffb454" fill-opacity="0.16"/>
  <text x="44" y="319" fill="#ffb454" font-size="10" font-weight="700">Mid</text>

  <rect x="16" y="344" width="368" height="62" rx="11" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09"/>
  <rect x="16" y="344" width="3" height="62" fill="#8a93a8"/>
  <text x="34" y="368" fill="#eceef6" font-size="13" font-weight="600">Reply to user feedback</text>
  <rect x="34" y="378" width="48" height="18" rx="9" fill="#8a93a8" fill-opacity="0.16"/>
  <text x="46" y="391" fill="#8a93a8" font-size="10" font-weight="700">Low</text>

  <!-- Later group -->
  <text x="16" y="438" fill="#a2a8bc" font-size="11" font-weight="700" letter-spacing="1">📥 LATER</text>
  <text x="372" y="438" fill="#6e7488" font-size="11" text-anchor="end">1</text>
  <rect x="16" y="448" width="368" height="62" rx="11" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09"/>
  <rect x="16" y="448" width="3" height="62" fill="#8a93a8"/>
  <text x="34" y="472" fill="#eceef6" font-size="13" font-weight="600">Plan Q3 roadmap</text>
</svg>
